<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlamAR</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn.pixelbin.io/v2/dummy-cloudname/t.resize(h:90,w:90)/__glam_ar/__sdk/favicon.png"
    />
    <style>
      html {
        font-size: 1vw;
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: Inter, sans-serif;
      }

      .container {
        position: fixed;
        width: 100%;
        height: 100%;
      }

      #GlamAR-module {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 0;
      }

      #error {
        position: absolute;
        top: 20px;
        left: 20px;
        font-weight: bold;
        font-size: 16px;
      }

      .centeredLoader {
        position: fixed;
        display: flex;
        width: 100%;
        height: 100%;
        background: var(--layout-background-color);
        justify-content: center;
        align-items: center;
        z-index: 5000;
        background: white;
      }
      .lottieContainer {
        display: flex;
        padding: 7.5rem;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.25rem;
        flex-shrink: 0;
      }
      .waveGrid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        width: 20rem;
        height: 20rem;
        flex-shrink: 0;
        aspect-ratio: 1 / 1;
      }
      .waveGrid .cell {
        width: 100%;
        height: 100%;
        background: #000;
        transform: scale(0.4);
        transform-origin: center;
        will-change: transform;
        animation: waveScale 1.57s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        box-shadow: 0 0 0 0.5px #000;
      }
      @keyframes waveScale {
        0% {
          transform: scale(0.4);
        }
        21% {
          transform: scale(1);
        }
        53% {
          transform: scale(1);
        }
        75% {
          transform: scale(0.4);
        }
        100% {
          transform: scale(0.4);
        }
      }
      .waveGrid .cell:nth-child(1) {
        animation-delay: 200ms;
      }
      .waveGrid .cell:nth-child(2) {
        animation-delay: 267ms;
      }
      .waveGrid .cell:nth-child(3) {
        animation-delay: 334ms;
      }
      .waveGrid .cell:nth-child(4) {
        animation-delay: 400ms;
      }
      .waveGrid .cell:nth-child(5) {
        animation-delay: 133ms;
      }
      .waveGrid .cell:nth-child(6) {
        animation-delay: 200ms;
      }
      .waveGrid .cell:nth-child(7) {
        animation-delay: 267ms;
      }
      .waveGrid .cell:nth-child(8) {
        animation-delay: 334ms;
      }
      .waveGrid .cell:nth-child(9) {
        animation-delay: 67ms;
      }
      .waveGrid .cell:nth-child(10) {
        animation-delay: 133ms;
      }
      .waveGrid .cell:nth-child(11) {
        animation-delay: 200ms;
      }
      .waveGrid .cell:nth-child(12) {
        animation-delay: 267ms;
      }
      .waveGrid .cell:nth-child(13) {
        animation-delay: 0ms;
      }
      .waveGrid .cell:nth-child(14) {
        animation-delay: 67ms;
      }
      .waveGrid .cell:nth-child(15) {
        animation-delay: 133ms;
      }
      .waveGrid .cell:nth-child(16) {
        animation-delay: 200ms;
      }
      .lottieText {
        margin: 0px;
        text-align: center;
        font-size: 3.75rem;
        font-style: normal;
        font-weight: 400;
      }

      @media (min-width: 648px) {
        .lottieContainer {
          padding: 3.7rem;
          gap: 0.62rem;
        }
        .waveGrid {
          width: 12.35rem;
          height: 12.35rem;
        }
        .lottieText {
          font-size: 2.16rem;
        }
      }

      /* Tablet Landscape */
      @media (min-width: 720px) and (orientation: landscape) {
        .lottieContainer {
          padding: 3.33rem;
          gap: 0.56rem;
        }
        .waveGrid {
          width: 11.11rem;
          height: 11.11rem;
        }
        .lottieText {
          font-size: 1.94rem;
        }
      }

      /* Web portrait */
      @media (min-width: 846px) and (orientation: portrait) {
        .lottieContainer {
          padding: 2.84rem;
          gap: 0.47rem;
        }
        .waveGrid {
          width: 14.18rem;
          height: 14.18rem;
        }
        .lottieText {
          font-size: 2.36rem;
        }
      }

      /* web Landscape */
      @media (min-width: 1440px) and (orientation: landscape) {
        .lottieContainer {
          padding: 1.67rem;
          gap: 0.28rem;
        }
        .waveGrid {
          width: 8.33rem;
          height: 8.33rem;
        }
        .lottieContainer h4 {
          font-size: 1.39rem;
        }
      }

      /* TV portrait */
      @media (min-width: 1080px) and (orientation: portrait) {
        .lottieContainer {
          padding: 2.22rem;
          gap: 0.37rem;
        }
        .waveGrid {
          width: 14.81rem;
          height: 14.81rem;
        }
        .lottieContainer h4 {
          font-size: 2.22rem;
        }
      }

      /* TV Landscape */
      @media (min-width: 1920px) and (orientation: landscape) {
        .lottieContainer {
          padding: 1.25rem;
          gap: 0.21rem;
        }
        .waveGrid {
          width: 8.33rem;
          height: 8.33rem;
        }
        .lottieContainer h4 {
          font-size: 1.25rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .waveGrid .cell {
          animation: none;
          transform: scale(1);
        }
      }
    </style>
    <script src="https://cdn.glamarz0.de/sdk/wrapper?=@1.2.8.js"></script>
  </head>

  <body>
    <div class="container">
      <div id="GlamAR-module"></div>
      <div id="error"><span class="error-text"></span></div>
    </div>
    <div class="centeredLoader" id="lottieLoader">
      <div class="lottieContainer">
        <div class="waveGrid" aria-hidden="true">
          <span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span
          ><span class="cell"></span><span class="cell"></span>
        </div>
        <h4 class="lottieText">Loading your experience</h4>
      </div>
    </div>
    <script>
      const lottieLoader = document.getElementById("lottieLoader");

      const errorText = document.querySelector(".error-text");
      const urlParams = new URLSearchParams(window.location.search);
      const apiKey = urlParams.get("accessKey");

      if (apiKey) {
        const config = {
          platform: "web",
          mode: "private",
          configuration: {},
          meta: {
            sdkVersion: "2.0.0",
          },
        };

        console.log("wrapper index init ", apiKey, config);
        GlamAR.init("GlamAR-module", apiKey, config);
        GlamAR.addEventListener("loading", () => {
          lottieLoader.style.display = "none";
        });
        GlamAR.addEventListener("loaded", () => {
          GlamAR.applyByCategory("makeup");
        });
      } else {
        errorText.textContent = "Invalid access key";
      }
    </script>
  </body>
</html>
