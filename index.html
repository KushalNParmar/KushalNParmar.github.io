<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Permissions-Policy"
      content="xr-spatial-tracking=(self)"
    />
    <title>GlamAR 3D Viewer</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn.pixelbin.io/v2/dummy-cloudname/t.resize(h:90,w:90)/__glam_ar/__sdk/favicon.png"
    />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      :root {
        --studio-ink: #1a0d11;
        --studio-shadow: #351217;
        --studio-burgundy: #7d2b45;
        --studio-rose: #a76478;
        --studio-blush: #d8a1af;
        --button-text: #161013;
        --button-surface: #fbf7f7;
        --hotspot-ring: rgba(255, 255, 255, 0.72);
        --hotspot-fill: rgba(255, 255, 255, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: white;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Arial,
          sans-serif;
        background:
          radial-gradient(
            circle at 34% 48%,
            rgba(226, 147, 169, 0.78) 0,
            rgba(139, 54, 80, 0.92) 32%,
            rgba(73, 24, 31, 0.98) 66%,
            var(--studio-ink) 100%
          ),
          linear-gradient(135deg, var(--studio-rose), var(--studio-shadow));
      }

      .viewer-stage {
        position: fixed;
        inset: 0;
        isolation: isolate;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(0, 0, 0, 0) 44%,
          rgba(0, 0, 0, 0.22) 100%
        );
      }

      .viewer-stage::before {
        position: absolute;
        right: -12vw;
        bottom: -18vh;
        width: 66vw;
        height: 52vh;
        content: "";
        background: radial-gradient(
          ellipse,
          rgba(34, 9, 13, 0.54) 0%,
          rgba(34, 9, 13, 0.16) 42%,
          rgba(34, 9, 13, 0) 70%
        );
        filter: blur(14px);
        pointer-events: none;
        transform: rotate(-4deg);
      }

      .viewer-stage::after {
        position: absolute;
        right: 8vw;
        bottom: 15vh;
        width: 3.75rem;
        height: 0.8rem;
        content: "";
        border-top: 2px solid rgba(255, 255, 255, 0.13);
        border-bottom: 2px solid rgba(255, 255, 255, 0.08);
        opacity: 0.7;
        transform: skewX(-18deg);
        pointer-events: none;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        margin-left: -8%;
        background-color: transparent;
        --poster-color: transparent;
        --progress-bar-color: var(--button-surface);
        --progress-mask: transparent;
      }

      .cta-row {
        position: fixed;
        left: 50%;
        bottom: clamp(2.3rem, 6vh, 5.2rem);
        z-index: 20;
        display: flex;
        gap: clamp(0.65rem, 1.2vw, 1.1rem);
        align-items: center;
        transform: translateX(-50%);
      }

      .cta {
        display: inline-flex;
        min-width: 10rem;
        min-height: 2.55rem;
        padding: 0.72rem 1.8rem;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        color: var(--button-text);
        background: var(--button-surface);
        box-shadow: 0 1.1rem 2.4rem rgba(30, 6, 12, 0.22);
        font-size: 0.82rem;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background 180ms ease;
        white-space: nowrap;
      }

      .cta:hover,
      .cta:focus-visible {
        background: white;
        box-shadow: 0 1.35rem 3rem rgba(30, 6, 12, 0.28);
        transform: translateY(-2px);
        outline: none;
      }

      .made-badge {
        position: fixed;
        left: clamp(1rem, 2.5vw, 3rem);
        bottom: clamp(1rem, 2.5vw, 2rem);
        z-index: 20;
        display: inline-flex;
        gap: 0.42rem;
        min-height: 1.75rem;
        padding: 0.38rem 0.7rem;
        align-items: center;
        border-radius: 0.28rem;
        color: #282124;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 0.75rem 1.5rem rgba(35, 8, 13, 0.22);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      .made-mark {
        position: relative;
        width: 1rem;
        height: 1rem;
        flex: 0 0 auto;
      }

      .made-mark::before,
      .made-mark::after {
        position: absolute;
        content: "";
        background: #282124;
        border-radius: 999px 999px 999px 0;
      }

      .made-mark::before {
        left: 0.08rem;
        top: 0.24rem;
        width: 0.46rem;
        height: 0.72rem;
        transform: rotate(-28deg);
      }

      .made-mark::after {
        right: 0.1rem;
        top: 0.12rem;
        width: 0.48rem;
        height: 0.82rem;
        transform: rotate(38deg);
      }

      .hotspot {
        width: 1.9rem;
        height: 1.9rem;
        padding: 0;
        border: 2px solid var(--hotspot-ring);
        border-radius: 50%;
        color: #8f3a52;
        background: var(--hotspot-fill);
        box-shadow:
          0 0 0 2px rgba(94, 34, 49, 0.22),
          0 0.65rem 1.2rem rgba(29, 8, 13, 0.18);
        cursor: pointer;
        transform: translate(-50%, -50%);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background 180ms ease;
      }

      .hotspot::before,
      .hotspot::after {
        position: absolute;
        left: 50%;
        top: 50%;
        content: "";
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .hotspot::before {
        width: 0.78rem;
        height: 2px;
      }

      .hotspot::after {
        width: 2px;
        height: 0.78rem;
      }

      .hotspot.info::before {
        width: 0.18rem;
        height: 0.64rem;
        border-radius: 999px;
      }

      .hotspot.info::after {
        width: 0.18rem;
        height: 0.18rem;
        border-radius: 50%;
        transform: translate(-50%, -0.58rem);
      }

      .hotspot.rotate::before {
        width: 0.72rem;
        height: 0.72rem;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        background: transparent;
      }

      .hotspot.rotate::after {
        width: 0.24rem;
        height: 0.24rem;
        border-top: 2px solid currentColor;
        border-right: 2px solid currentColor;
        background: transparent;
        transform: translate(0.12rem, -0.5rem) rotate(35deg);
      }

      .hotspot:hover,
      .hotspot:focus-visible {
        background: white;
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.2),
          0 0.85rem 1.7rem rgba(29, 8, 13, 0.25);
        outline: none;
        transform: translate(-50%, -50%) scale(1.08);
      }

      .hotspot-card {
        position: absolute;
        left: 50%;
        top: calc(100% + 0.6rem);
        min-width: 8.5rem;
        padding: 0.55rem 0.7rem;
        border-radius: 0.5rem;
        color: #2f161d;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0.85rem 2rem rgba(29, 8, 13, 0.22);
        font-size: 0.72rem;
        font-weight: 650;
        line-height: 1.2;
        opacity: 0;
        pointer-events: none;
        text-align: center;
        transform: translate(-50%, -0.25rem);
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .hotspot:hover .hotspot-card,
      .hotspot:focus-visible .hotspot-card {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .centered-loader {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at 45% 45%,
          rgba(194, 104, 128, 0.96),
          rgba(76, 24, 34, 0.98) 68%
        );
        transition:
          opacity 260ms ease,
          visibility 260ms ease;
      }

      .centered-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        gap: 1.15rem;
        align-items: center;
      }

      .wave-grid {
        display: grid;
        width: 5.25rem;
        height: 5.25rem;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }

      .wave-grid .cell {
        width: 100%;
        height: 100%;
        background: white;
        box-shadow: 0 0 0 0.5px white;
        transform: scale(0.4);
        transform-origin: center;
        animation: wave-scale 1.57s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        will-change: transform;
      }

      @keyframes wave-scale {
        0%,
        100% {
          transform: scale(0.4);
        }

        21%,
        53% {
          transform: scale(1);
        }

        75% {
          transform: scale(0.4);
        }
      }

      .wave-grid .cell:nth-child(1) {
        animation-delay: 200ms;
      }

      .wave-grid .cell:nth-child(2) {
        animation-delay: 267ms;
      }

      .wave-grid .cell:nth-child(3) {
        animation-delay: 334ms;
      }

      .wave-grid .cell:nth-child(4) {
        animation-delay: 400ms;
      }

      .wave-grid .cell:nth-child(5) {
        animation-delay: 133ms;
      }

      .wave-grid .cell:nth-child(6) {
        animation-delay: 200ms;
      }

      .wave-grid .cell:nth-child(7) {
        animation-delay: 267ms;
      }

      .wave-grid .cell:nth-child(8) {
        animation-delay: 334ms;
      }

      .wave-grid .cell:nth-child(9) {
        animation-delay: 67ms;
      }

      .wave-grid .cell:nth-child(10) {
        animation-delay: 133ms;
      }

      .wave-grid .cell:nth-child(11) {
        animation-delay: 200ms;
      }

      .wave-grid .cell:nth-child(12) {
        animation-delay: 267ms;
      }

      .wave-grid .cell:nth-child(13) {
        animation-delay: 0ms;
      }

      .wave-grid .cell:nth-child(14) {
        animation-delay: 67ms;
      }

      .wave-grid .cell:nth-child(15) {
        animation-delay: 133ms;
      }

      .wave-grid .cell:nth-child(16) {
        animation-delay: 200ms;
      }

      .loader-text,
      .error-text {
        margin: 0;
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(1rem, 1.4vw, 1.35rem);
        font-weight: 450;
        letter-spacing: 0;
      }

      .error-text {
        position: fixed;
        left: 50%;
        bottom: clamp(6rem, 12vh, 8rem);
        z-index: 30;
        display: none;
        max-width: min(32rem, calc(100vw - 2rem));
        padding: 0.85rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 0.65rem;
        background: rgba(41, 13, 18, 0.78);
        box-shadow: 0 0.85rem 2rem rgba(29, 8, 13, 0.22);
        text-align: center;
        transform: translateX(-50%);
      }

      .ar-button {
        display: inline-flex;
        min-height: 2.35rem;
        padding: 0.68rem 1.25rem;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        color: var(--button-text);
        background: var(--button-surface);
        box-shadow: 0 0.75rem 1.5rem rgba(30, 6, 12, 0.18);
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 650;
      }

      .hotspot.is-active {
        background: white;
        box-shadow:
          0 0 0 6px rgba(255, 255, 255, 0.22),
          0 1rem 2rem rgba(29, 8, 13, 0.3);
      }

      .detail-callout {
        position: fixed;
        left: clamp(36rem, 50vw, 58rem);
        top: clamp(9rem, 28vh, 20rem);
        z-index: 19;
        width: min(34rem, 42vw);
        color: white;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 0.18rem 0.8rem rgba(34, 9, 13, 0.28);
        transform: translateY(0.75rem);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .detail-callout.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .detail-callout::before {
        position: absolute;
        left: -9.5rem;
        top: 2.35rem;
        width: 8.25rem;
        height: 4.4rem;
        content: "";
        border-top: 2px solid rgba(255, 255, 255, 0.88);
        border-left: 2px solid rgba(255, 255, 255, 0.88);
        transform: skewY(-34deg);
        transform-origin: top left;
      }

      .detail-kicker {
        margin: 0 0 0.35rem;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .detail-title-row {
        display: flex;
        min-height: 2.6rem;
        align-items: center;
        gap: 0.8rem;
        border-bottom: 2px solid rgba(255, 255, 255, 0.86);
      }

      .detail-icon {
        display: inline-flex;
        width: 2rem;
        height: 2rem;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.88);
        border-radius: 50%;
        font-size: 0.95rem;
        font-weight: 900;
        line-height: 1;
      }

      .detail-title {
        margin: 0;
        font-size: clamp(1.45rem, 2.4vw, 2.35rem);
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }

      .detail-body {
        margin: 1rem 0 0;
        max-width: 28rem;
        color: rgba(255, 255, 255, 0.88);
        font-size: clamp(0.88rem, 1.1vw, 1.08rem);
        font-weight: 560;
        line-height: 1.45;
      }

      .detail-list {
        display: grid;
        margin: 1rem 0 0;
        padding: 0;
        gap: 0.4rem;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(0.82rem, 0.95vw, 0.96rem);
        font-weight: 650;
        line-height: 1.35;
        list-style: none;
      }

      .detail-list li::before {
        content: "- ";
      }

      .detail-close {
        position: absolute;
        right: 0;
        top: -0.25rem;
        width: 2.1rem;
        height: 2.1rem;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 50%;
        color: white;
        background: rgba(41, 13, 18, 0.42);
        cursor: pointer;
        font: inherit;
        font-size: 1.1rem;
        line-height: 1;
      }

      .assembly-dock {
        position: fixed;
        left: clamp(21rem, 36vw, 36rem);
        top: clamp(10rem, 29vh, 20rem);
        z-index: 18;
        display: flex;
        width: 7rem;
        min-height: 9rem;
        flex-direction: column;
        gap: 0.45rem;
        pointer-events: none;
      }

      .floor-parts {
        position: fixed;
        right: clamp(5rem, 14vw, 18rem);
        bottom: clamp(9rem, 16vh, 13rem);
        z-index: 18;
        display: flex;
        gap: clamp(0.7rem, 1.4vw, 1.35rem);
        align-items: end;
        perspective: 42rem;
      }

      .floor-parts.is-empty {
        display: none;
      }

      .floor-part {
        position: relative;
        display: grid;
        width: clamp(4.8rem, 6.2vw, 6.5rem);
        min-height: clamp(2.6rem, 3.5vw, 3.6rem);
        padding: 0.75rem 0.68rem 0.62rem;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.35rem 0.35rem 1.2rem 1.2rem;
        color: rgba(255, 255, 255, 0.92);
        background:
          linear-gradient(
            180deg,
            rgba(142, 83, 97, 0.95),
            rgba(62, 25, 31, 0.98)
          ),
          var(--studio-shadow);
        box-shadow:
          inset 0 0.7rem 1.4rem rgba(255, 255, 255, 0.08),
          0 1.6rem 2.6rem rgba(24, 7, 11, 0.36);
        cursor: pointer;
        font: inherit;
        font-size: clamp(0.65rem, 0.8vw, 0.78rem);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.05;
        text-align: center;
        transform: rotateX(58deg) rotateZ(var(--part-rotation, 0deg));
        transform-origin: 50% 100%;
        transition:
          filter 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
      }

      .floor-part::before {
        position: absolute;
        left: 50%;
        top: -0.42rem;
        width: 58%;
        height: 0.72rem;
        content: "";
        border-radius: 0.45rem 0.45rem 0.08rem 0.08rem;
        background: linear-gradient(180deg, #b78390, #5f2934);
        transform: translateX(-50%);
      }

      .floor-part::after {
        position: absolute;
        left: 18%;
        right: 18%;
        bottom: -1rem;
        height: 0.75rem;
        content: "";
        border-radius: 50%;
        background: rgba(35, 8, 13, 0.26);
        filter: blur(0.35rem);
      }

      .floor-part:hover,
      .floor-part:focus-visible {
        filter: brightness(1.08);
        outline: none;
        box-shadow:
          inset 0 0.7rem 1.4rem rgba(255, 255, 255, 0.11),
          0 1.85rem 3rem rgba(24, 7, 11, 0.46);
      }

      .floor-part.is-attached {
        width: 4.5rem;
        min-height: 2.4rem;
        padding: 0.5rem 0.55rem;
        border-color: rgba(255, 255, 255, 0.36);
        background:
          linear-gradient(
            180deg,
            rgba(244, 236, 237, 0.96),
            rgba(159, 105, 117, 0.94)
          ),
          var(--studio-rose);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.16),
          0 0.9rem 1.8rem rgba(24, 7, 11, 0.28);
        color: #32141b;
        pointer-events: auto;
        transform: rotateZ(var(--part-rotation, 0deg));
      }

      .floor-part.is-attached::after {
        display: none;
      }

      .floor-part-label {
        position: relative;
        z-index: 1;
        display: -webkit-box;
        max-width: 100%;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .parts-hint {
        position: fixed;
        right: clamp(4.8rem, 14vw, 18rem);
        bottom: clamp(6.9rem, 12.5vh, 10.2rem);
        z-index: 18;
        margin: 0;
        color: rgba(255, 255, 255, 0.68);
        font-size: 0.78rem;
        font-weight: 650;
        text-align: right;
        text-shadow: 0 0.4rem 0.9rem rgba(34, 9, 13, 0.34);
      }

      .parts-hint.is-hidden {
        display: none;
      }

      @media (max-width: 860px) {
        model-viewer {
          width: 128%;
          margin-left: -26%;
        }

        .cta-row {
          bottom: 3.8rem;
        }

        .made-badge {
          left: 50%;
          transform: translateX(-50%);
        }

        .cta {
          min-width: 8.4rem;
          min-height: 2.4rem;
          padding: 0.68rem 1.15rem;
          font-size: 0.76rem;
        }

        .hotspot {
          width: 2.25rem;
          height: 2.25rem;
        }

        .detail-callout {
          left: 1.25rem;
          right: 1.25rem;
          top: 4.6rem;
          width: auto;
        }

        .detail-callout::before {
          display: none;
        }

        .detail-title-row {
          padding-right: 2.8rem;
        }

        .detail-body {
          max-width: none;
        }

        .assembly-dock {
          left: 1rem;
          top: 12rem;
          width: 4.8rem;
          min-height: 7rem;
        }

        .floor-parts {
          right: 1.1rem;
          bottom: 7.4rem;
          gap: 0.52rem;
        }

        .floor-part {
          width: 4.2rem;
          min-height: 2.5rem;
          font-size: 0.62rem;
        }

        .parts-hint {
          display: none;
        }
      }

      @media (max-width: 520px) {
        .cta-row {
          width: min(21rem, calc(100vw - 2rem));
          justify-content: center;
        }

        .cta {
          flex: 1;
          min-width: 0;
          padding-inline: 0.75rem;
        }

        .hotspot-card {
          display: none;
        }

        .detail-callout {
          top: 1rem;
          padding: 0.9rem;
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 0.75rem;
          background: rgba(42, 13, 19, 0.68);
          backdrop-filter: blur(0.8rem);
        }

        .detail-title {
          font-size: 1.25rem;
        }

        .detail-body,
        .detail-list {
          font-size: 0.78rem;
        }

        .floor-parts {
          bottom: 8.15rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wave-grid .cell {
          animation: none;
          transform: scale(1);
        }

        .cta,
        .hotspot,
        .hotspot-card,
        .floor-part,
        .detail-callout,
        .centered-loader {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="viewer-stage">
      <model-viewer
        id="productViewer"
        alt="Interactive 3D product"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls
        touch-action="pan-y"
        auto-rotate
        auto-rotate-delay="1400"
        rotation-per-second="18deg"
        shadow-intensity="1"
        shadow-softness="0.82"
        environment-image="neutral"
        exposure="1.18"
        tone-mapping="neutral"
        camera-orbit="-28deg 68deg 24m"
        field-of-view="60deg"
        min-field-of-view="18deg"
        max-field-of-view="65deg"
        loading="eager"
        reveal="auto"
        interaction-prompt="auto"
      >
        <button slot="ar-button" class="ar-button">View in AR</button>
      </model-viewer>

      <section
        class="detail-callout"
        id="detailCallout"
        aria-live="polite"
        aria-hidden="true"
      >
        <button
          class="detail-close"
          id="detailClose"
          type="button"
          aria-label="Close details"
        >
          x
        </button>
        <p class="detail-kicker" id="detailKicker"></p>
        <div class="detail-title-row">
          <span class="detail-icon" id="detailIcon" aria-hidden="true"></span>
          <h2 class="detail-title" id="detailTitle"></h2>
        </div>
        <p class="detail-body" id="detailBody"></p>
        <ul class="detail-list" id="detailList"></ul>
      </section>

      <div class="assembly-dock" id="assemblyDock" aria-hidden="true"></div>
      <div class="floor-parts is-empty" id="floorParts"></div>
      <p class="parts-hint is-hidden" id="partsHint">
        Select a floor part to attach an animation
      </p>

      <nav class="cta-row" aria-label="Product actions">
        <a
          class="cta"
          id="bookDemoCta"
          href="#"
          target="_blank"
          rel="noreferrer"
        >
          Book a demo call
        </a>
        <a
          class="cta"
          id="learnMoreCta"
          href="#"
          target="_blank"
          rel="noreferrer"
        >
          Learn more
        </a>
      </nav>

      <div class="made-badge" aria-label="Made with GlamAR">
        <span class="made-mark" aria-hidden="true"></span>
        <span>Made with GlamAR</span>
      </div>
    </main>

    <div class="centered-loader" id="loader">
      <div class="loader-content">
        <div class="wave-grid" aria-hidden="true">
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
          <span class="cell"></span><span class="cell"></span>
        </div>
        <h1 class="loader-text">Loading your experience</h1>
      </div>
    </div>

    <p class="error-text" id="errorText"></p>

    <script>
      const DEFAULT_MODEL_URL = "__3D_VIEWER_DEFAULT_MODEL_URL__";
      const DEFAULT_DEMO_URL = "https://www.glamar.io/contact-us/";
      const DEFAULT_LEARN_URL = "https://www.glamar.io/";
      const STATIC_ANIMATION_PATTERN = /(idle|stand|rest|pose|default)/i;

      const DEFAULT_HOTSPOTS = [
        {
          id: "motion",
          className: "rotate",
          anchor: { x: 0.1, y: 0.78, z: 0.56 },
          fallbackPosition: "0m 1.5m 0.34m",
          normal: "0m 0m 1m",
          kicker: "Motion",
          icon: "A",
          title: "Animation system",
          body: "Animation clips are discovered directly from the loaded GLB. Selecting a floor part plays the matching clip and docks that part onto the product view.",
          details: [
            "No animation clip names are hardcoded",
            "The first three action clips become floor parts",
            "Attached parts can be clicked again to replay their clip",
          ],
          includeAnimations: true,
          cameraOrbit: "-18deg 66deg 15m",
          fieldOfView: "42deg",
        },
        {
          id: "controls",
          className: "info",
          anchor: { x: -0.26, y: 0.52, z: 0.56 },
          fallbackPosition: "0.36m 1.08m 0.25m",
          normal: "0m 0m 1m",
          kicker: "Controls",
          icon: "I",
          title: "Interactive controls",
          body: "Hotspots can focus the camera and open product information. This copy is local for now, but the display is already config-driven.",
          details: [
            "Click and drag the model to inspect it",
            "Use the hotspots for focused product details",
            "Use the floor parts for model animation actions",
          ],
          cameraOrbit: "-8deg 72deg 13m",
          fieldOfView: "40deg",
        },
        {
          id: "specs",
          className: "",
          anchor: { x: 0.22, y: 0.28, z: 0.56 },
          fallbackPosition: "-0.24m 0.78m 0.2m",
          normal: "0m 0m 1m",
          kicker: "Details",
          icon: "D",
          title: "Model details",
          body: "This panel mirrors the Vectary detail view: a focused callout, title, short copy, and scannable details beside the product.",
          details: [
            "Works with the default RobotExpressive model",
            "Model URL can be replaced with ?model=, ?url=, ?glb=, or ?src=",
            "Hotspot content can move to API or config later",
          ],
          cameraOrbit: "22deg 68deg 14m",
          fieldOfView: "42deg",
        },
      ];

      const viewer = document.getElementById("productViewer");
      const loader = document.getElementById("loader");
      const errorText = document.getElementById("errorText");
      const bookDemoCta = document.getElementById("bookDemoCta");
      const learnMoreCta = document.getElementById("learnMoreCta");
      const detailCallout = document.getElementById("detailCallout");
      const detailClose = document.getElementById("detailClose");
      const detailKicker = document.getElementById("detailKicker");
      const detailIcon = document.getElementById("detailIcon");
      const detailTitle = document.getElementById("detailTitle");
      const detailBody = document.getElementById("detailBody");
      const detailList = document.getElementById("detailList");
      const floorParts = document.getElementById("floorParts");
      const assemblyDock = document.getElementById("assemblyDock");
      const partsHint = document.getElementById("partsHint");
      const params = new URLSearchParams(window.location.search);
      const baseCamera = {
        orbit: viewer.getAttribute("camera-orbit"),
        fieldOfView: viewer.getAttribute("field-of-view"),
      };
      let animationResetTimer;
      let activeHotspotId = "";

      function firstParam(names) {
        for (const name of names) {
          const value = params.get(name);
          if (value) return value;
        }
        return "";
      }

      function setHref(element, value, fallback) {
        element.href = value || fallback;
      }

      function hideLoader() {
        loader.classList.add("is-hidden");
      }

      function showError(message) {
        errorText.textContent = message;
        errorText.style.display = "block";
        hideLoader();
      }

      function toPositiveInteger(value, fallback) {
        const parsed = Number.parseInt(value, 10);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
      }

      const sceneConfig = {
        maxAssemblyParts: toPositiveInteger(
          firstParam(["parts", "maxParts"]),
          3,
        ),
        hotspots: DEFAULT_HOTSPOTS,
        ...(window.GLAMAR_3D_VIEWER_CONFIG || {}),
      };

      function formatLabel(value) {
        return String(value || "")
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function getAvailableAnimations() {
        return Array.isArray(viewer.availableAnimations)
          ? viewer.availableAnimations.filter(Boolean)
          : [];
      }

      function getPreferredIdleAnimation() {
        const animations = getAvailableAnimations();
        return (
          animations.find((name) => STATIC_ANIMATION_PATTERN.test(name)) ||
          animations[0] ||
          ""
        );
      }

      function getAssemblyAnimations() {
        const animations = getAvailableAnimations();
        const actionAnimations = animations.filter(
          (name) => !STATIC_ANIMATION_PATTERN.test(name),
        );
        return (actionAnimations.length ? actionAnimations : animations).slice(
          0,
          sceneConfig.maxAssemblyParts,
        );
      }

      function setCamera(orbit, fieldOfView) {
        if (orbit) viewer.setAttribute("camera-orbit", orbit);
        if (fieldOfView) viewer.setAttribute("field-of-view", fieldOfView);
      }

      function playDefaultAnimation() {
        const animationName = getPreferredIdleAnimation();
        if (!animationName) return;

        viewer.animationName = animationName;
        viewer.currentTime = 0;
        viewer.play();
      }

      function playAnimation(animationName) {
        if (!animationName) return;

        window.clearTimeout(animationResetTimer);
        viewer.autoRotate = false;
        viewer.animationName = animationName;
        viewer.currentTime = 0;
        viewer.play({ repetitions: 1 });

        const durationMs =
          Number.isFinite(viewer.duration) && viewer.duration > 0
            ? Math.min(Math.max(viewer.duration * 1000, 1400), 6200)
            : 2400;

        animationResetTimer = window.setTimeout(() => {
          playDefaultAnimation();
        }, durationMs + 220);
      }

      function updateFloorVisibility() {
        floorParts.classList.toggle("is-empty", !floorParts.children.length);
        partsHint.classList.toggle("is-hidden", !floorParts.children.length);
      }

      function movePartToDock(part) {
        const firstBox = part.getBoundingClientRect();

        assemblyDock.appendChild(part);
        part.classList.add("is-attached");
        part.setAttribute(
          "aria-label",
          `Replay ${part.dataset.label} animation`,
        );

        const lastBox = part.getBoundingClientRect();
        const deltaX = firstBox.left - lastBox.left;
        const deltaY = firstBox.top - lastBox.top;
        const reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;

        if (!reduceMotion) {
          part.animate(
            [
              {
                transform: `translate(${deltaX}px, ${deltaY}px) rotateX(58deg) rotateZ(${part.dataset.rotation})`,
                opacity: 0.92,
              },
              {
                transform:
                  "translate(0, 0) rotateZ(var(--part-rotation, 0deg))",
                opacity: 1,
              },
            ],
            {
              duration: 820,
              easing: "cubic-bezier(0.2, 0.85, 0.2, 1)",
              fill: "both",
            },
          );
        }

        updateFloorVisibility();
      }

      function handlePartClick(part) {
        const animationName = part.dataset.animationName;
        playAnimation(animationName);

        if (!part.classList.contains("is-attached")) {
          movePartToDock(part);
        }
      }

      function renderAssemblyParts() {
        const animations = getAssemblyAnimations();
        floorParts.replaceChildren();
        assemblyDock.replaceChildren();

        animations.forEach((animationName, index) => {
          const label = formatLabel(animationName);
          const rotation = ["-5deg", "3deg", "-2deg"][index % 3];
          const part = document.createElement("button");
          const partLabel = document.createElement("span");

          part.type = "button";
          part.className = "floor-part";
          part.dataset.animationName = animationName;
          part.dataset.label = label;
          part.dataset.rotation = rotation;
          part.style.setProperty("--part-rotation", rotation);
          part.setAttribute(
            "aria-label",
            `Play ${label} animation and attach part`,
          );

          partLabel.className = "floor-part-label";
          partLabel.textContent = label;
          part.appendChild(partLabel);

          part.addEventListener("click", () => handlePartClick(part));
          floorParts.appendChild(part);
        });

        updateFloorVisibility();
      }

      function getModelBounds() {
        if (
          typeof viewer.getDimensions !== "function" ||
          typeof viewer.getBoundingBoxCenter !== "function"
        ) {
          return null;
        }

        const dimensions = viewer.getDimensions();
        const center = viewer.getBoundingBoxCenter();
        return {
          center,
          dimensions,
          bottomY: center.y - dimensions.y / 2,
        };
      }

      function resolveHotspotPosition(hotspot) {
        if (hotspot.position) return hotspot.position;

        const bounds = getModelBounds();
        if (!bounds || !hotspot.anchor) {
          return hotspot.fallbackPosition || "0m 0m 0m";
        }

        const x = bounds.center.x + bounds.dimensions.x * hotspot.anchor.x;
        const y = bounds.bottomY + bounds.dimensions.y * hotspot.anchor.y;
        const z = bounds.center.z + bounds.dimensions.z * hotspot.anchor.z;
        return `${x}m ${y}m ${z}m`;
      }

      function renderHotspots() {
        viewer
          .querySelectorAll(".hotspot")
          .forEach((button) => button.remove());

        sceneConfig.hotspots.forEach((hotspot) => {
          const button = document.createElement("button");
          const label = document.createElement("span");

          button.type = "button";
          button.slot = `hotspot-${hotspot.id}`;
          button.className = `hotspot ${hotspot.className || ""}`.trim();
          button.dataset.hotspotId = hotspot.id;
          button.dataset.position = resolveHotspotPosition(hotspot);
          button.dataset.normal = hotspot.normal || "0m 0m 1m";
          button.setAttribute("aria-label", hotspot.title);

          label.className = "hotspot-card";
          label.textContent = hotspot.title;
          button.appendChild(label);

          button.addEventListener("click", (event) => {
            event.stopPropagation();
            showHotspotDetails(hotspot.id);
          });

          viewer.appendChild(button);
        });
      }

      function getAnimationSummary() {
        const names = getAvailableAnimations().map(formatLabel);
        if (!names.length)
          return ["This model does not expose animation clips"];

        return [
          `${names.length} animation clip${names.length === 1 ? "" : "s"} detected`,
          `Assembly actions: ${getAssemblyAnimations().map(formatLabel).join(", ")}`,
        ];
      }

      function showHotspotDetails(id) {
        const hotspot = sceneConfig.hotspots.find((item) => item.id === id);
        if (!hotspot) return;

        activeHotspotId = id;
        viewer.autoRotate = false;
        setCamera(hotspot.cameraOrbit, hotspot.fieldOfView);

        detailKicker.textContent = hotspot.kicker || "Details";
        detailIcon.textContent = hotspot.icon || "I";
        detailTitle.textContent = hotspot.title;
        detailBody.textContent = hotspot.body || "";
        detailList.replaceChildren();

        const details = [
          ...(hotspot.details || []),
          ...(hotspot.includeAnimations ? getAnimationSummary() : []),
        ];

        details.forEach((detail) => {
          const item = document.createElement("li");
          item.textContent = detail;
          detailList.appendChild(item);
        });

        detailCallout.classList.add("is-visible");
        detailCallout.setAttribute("aria-hidden", "false");

        viewer.querySelectorAll(".hotspot").forEach((button) => {
          button.classList.toggle(
            "is-active",
            button.dataset.hotspotId === activeHotspotId,
          );
        });
      }

      function closeHotspotDetails() {
        activeHotspotId = "";
        detailCallout.classList.remove("is-visible");
        detailCallout.setAttribute("aria-hidden", "true");
        setCamera(baseCamera.orbit, baseCamera.fieldOfView);

        viewer.querySelectorAll(".hotspot").forEach((button) => {
          button.classList.remove("is-active");
        });
      }

      const modelUrl = firstParam(["model", "url", "glb", "src"]);
      const posterUrl = firstParam(["poster", "image", "thumbnail"]);
      const iosUrl = firstParam(["ios", "usdz"]);
      const title = firstParam(["title", "name"]);

      viewer.src = modelUrl || DEFAULT_MODEL_URL;
      if (posterUrl) viewer.poster = posterUrl;
      if (iosUrl) viewer.setAttribute("ios-src", iosUrl);
      if (title) {
        document.title = `${title} | GlamAR 3D Viewer`;
        viewer.alt = `${title} 3D product`;
      }

      setHref(
        bookDemoCta,
        firstParam(["demoUrl", "bookUrl"]),
        DEFAULT_DEMO_URL,
      );
      setHref(
        learnMoreCta,
        firstParam(["learnUrl", "detailsUrl"]),
        DEFAULT_LEARN_URL,
      );

      viewer.addEventListener("load", () => {
        hideLoader();
        renderAssemblyParts();
        renderHotspots();
        playDefaultAnimation();
      });

      viewer.addEventListener("error", () => {
        showError("Unable to load the 3D model. Please check the model URL.");
      });

      detailClose.addEventListener("click", closeHotspotDetails);

      window.setTimeout(() => {
        if (!viewer.loaded) hideLoader();
      }, 9000);

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          viewer.pause();
        } else {
          playDefaultAnimation();
        }
      });
    </script>
  </body>
</html>
