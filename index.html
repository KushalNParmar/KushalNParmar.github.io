<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Model Viewer</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"
    ></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      model-viewer {
        position: relative;
        width: 100%;
        height: 100%;
        background: #f5f5f5;
      }

      #arButton {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 1;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        background: #111;
        color: #fff;
        font: 600 16px system-ui, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <model-viewer
      id="modelViewer"
      alt="3D model"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      shadow-intensity="1"
      loading="eager"
    ></model-viewer>

    <button id="arButton" type="button">View in Room</button>

    <script>
      const modelViewer = document.getElementById("modelViewer");
      const params = new URLSearchParams(window.location.search);
      modelViewer.src =
        params.get("url") || params.get("glb") || params.get("model") || "";

      document.getElementById("arButton").addEventListener("click", () => {
        modelViewer.activateAR();
      });
    </script>
  </body>
</html>
